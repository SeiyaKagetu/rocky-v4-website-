<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKOUT | NOVE OS V34</title>
    <style>
        :root { --bg: #05050a; --accent: #00ccff; --text: #e0e0e0; --gold: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 2rem; }
        header { border-bottom: 1px solid rgba(0,204,255,0.2); padding-bottom: 1rem; margin-bottom: 2rem; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-decoration: none; }
        .checkout-container { max-width: 800px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .order-summary { background: rgba(255,255,255,0.02); padding: 2rem; border-radius: 15px; border: 1px solid #222; }
        .payment-methods { display: flex; flex-direction: column; gap: 20px; }
        .pay-btn { display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; cursor: pointer; border: none; }
        .stripe-btn { background: #635bff; color: white; }
        .paypal-btn { background: #ffc439; color: #111; }
        .pqc-badge { color: var(--gold); font-size: 0.8rem; border: 1px solid var(--gold); padding: 2px 8px; border-radius: 5px; margin-top: 10px; display: inline-block; }
        @media (max-width: 600px) { .checkout-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">NOVE OS V34</a></header>
<main>
    <div class="checkout-container">
        <div class="order-summary">
            <h2>ご注文内容</h2>
            <hr style="border:0; border-top:1px solid #333;">
            <p><strong>NOVE OS V34 Defense Grade</strong></p>
            <p style="font-size: 2rem; font-weight: bold; color: var(--accent);">¥50,000 <span style="font-size: 1rem; color: #888;">/ 月</span></p>
            <div class="pqc-badge">Quantum-Safe Checkout Active</div>
            <ul style="font-size: 0.9rem; padding-left: 20px; margin-top: 20px; color: #aaa;">
                <li>耐量子暗号 (ML-KEM) ライセンス</li>
                <li>ISMAP適合・防衛省基準環境</li>
                <li>24/7 AI監視 (N-DIS)</li>
            </ul>
        </div>
        <div class="payment-methods">
            <h2>お支払い方法</h2>
            <p>安全な外部決済ゲートウェイへ移行します。</p>
            
            <!-- Stripe Checkout -->
            <form action="/api/create-checkout-session" method="POST">
                <input type="hidden" name="plan" value="defense">
                <button type="submit" class="pay-btn stripe-btn" style="width: 100%;">
                    Stripe で支払う
                </button>
            </form>

            <!-- PayPal Checkout -->
            <div id="paypal-button-container"></div>
            <a href="#" class="pay-btn paypal-btn">PayPal で支払う</a>

            <p style="font-size: 0.8rem; color: #555; text-align: center;">
                すべての通信は ML-KEM-768 により暗号化され、カード情報は当サーバーには保存されません。
            </p>
        </div>
    </div>
</main>
<script>
    console.log("V34 Secure Payment Module Initialized.");
</script>
</body>
</html>
