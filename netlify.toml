# Netlify設定ファイル
# Rocky Linux v4.0 Webサイト

[build]
  # ビルドコマンド（静的サイトなので不要）
  command = ""
  # 公開ディレクトリ
  publish = "."
  # Functions ディレクトリ
  functions = "netlify/functions"

# リダイレクト設定
[[redirects]]
  from = "/api/contact"
  to = "https://formspree.io/f/mbdpvwey"
  status = 200
  force = true

[[redirects]]
  from = "/admin"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/admin.html"
  to = "/"
  status = 301
  force = true
