<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | NOVE OS V34</title>
    <!-- Favicon (SVG data URI) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100' rx='20'/><text x='50' y='70' text-anchor='middle' font-size='60' font-weight='bold' fill='white' font-family='Arial'>N</text></svg>">
    <style>
        :root { --bg: #05050a; --accent: #00ccff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { padding: 2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .form-container { max-width: 500px; margin: 3rem auto; background: rgba(255,255,255,0.02); padding: 2rem; border-radius: 20px; border: 1px solid #222; flex-grow: 1; }
        h1 { color: var(--accent); text-align: center; margin-bottom: 2rem; }
        label { display: block; margin-top: 1rem; font-size: 0.9rem; color: #aaa; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; transition: 0.3s; margin-top: 2rem; font-size: 1rem; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--accent); transform: translateY(-2px); }
        footer { padding: 2rem; text-align: center; font-size: 0.8rem; color: #444; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
<header>
    <a href="index.html" style="text-decoration: none; color: #fff; font-weight: bold; font-size: 1.5rem; letter-spacing: 2px;">NOVE<span style="color:var(--accent)">OS</span></a>
</header>
<main>
    <div class="form-container">
        <h1>お問い合わせ</h1>
        <!-- 
             根本的解決: 
             1. action を Formspree の絶対URLに固定 (404を物理的に回避)
             2. JavaScript による妨害を排除 (確実に送信)
        -->
        <form action="https://formspree.io/f/mbdpvwey" method="POST">
            <input type="hidden" name="_subject" value="NoveOS.jp お問い合わせ">
            <input type="hidden" name="_language" value="ja">
            <input type="hidden" name="_next" value="https://noveos.jp/index.html">

            <label>氏名 *</label>
            <input type="text" name="name" required placeholder="お名前">

            <label>メールアドレス *</label>
            <input type="email" name="email" required placeholder="email@example.com">

            <label>所属・組織</label>
            <input type="text" name="company" placeholder="会社名など">

            <label>お問い合わせ内容 *</label>
            <select name="plan">
                <option value="Personal">Personal Plan について</option>
                <option value="Defense">Defense Grade について</option>
                <option value="Ultimate">Ultimate Beyond (極秘案件) について</option>
                <option value="Other">その他</option>
            </select>

            <label>メッセージ *</label>
            <textarea name="message" rows="5" required placeholder="メッセージを入力してください"></textarea>

            <button type="submit" class="btn-submit">送信する (V34 Secure)</button>
        </form>
    </div>
</main>
<footer>
    &copy; 2026 NOVE INFINITY PROJECT.
</footer>
</body>
</html>
