<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUCCESS | NOVE OS V34</title>
    <style>
        :root { --bg: #05050a; --accent: #00ccff; --text: #e0e0e0; --gold: #ffcc00; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 10, 0.8);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 204, 255, 0.3));
        }

        .logo-text-group { display: flex; flex-direction: column; line-height: 1; }
        .logo-main {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(to right, #fff, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-suffix { font-weight: 300; opacity: 0.7; }
        .logo-version { font-size: 0.6rem; letter-spacing: 4px; color: #ff3366; font-weight: bold; margin-top: 4px; }

        .success-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid var(--accent); padding: 4rem 2rem; border-radius: 20px; max-width: 600px; box-shadow: 0 0 50px rgba(0,204,255,0.1); }
        .icon { font-size: 5rem; color: var(--accent); margin-bottom: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #fff; }
        p { font-size: 1.1rem; color: #88aadd; line-height: 1.8; }
        .btn { display: inline-block; padding: 15px 40px; background: var(--accent); color: #000; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 2rem; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo-wrapper">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 30V10L30 30V10" stroke="url(#logo-grad-success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
                <linearGradient id="logo-grad-success" x1="10" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#00ccff"/>
                    <stop offset="1" stop-color="#ff3366"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="logo-text-group">
            <span class="logo-main">NOVE<span class="logo-suffix">OS</span></span>
            <span class="logo-version">V34 BEYOND</span>
        </div>
    </a>
</header>
<div class="success-container">
    <div class="card">
        <div class="icon">✓</div>
        <h1>決済・お問い合わせ完了</h1>
        <p>NOVE OS V34 "ULTIMATE BEYOND" へのリクエストが承認されました。<br>ライセンスキーおよび導入手順は、登録されたメールアドレス宛に送信されます。<br>1営業日以内に、専任エンジニアからの個別フォローアップを開始いたします。</p>
        <a href="index.html" class="btn">ホームへ戻る</a>
    </div>
</div>
</body>
</html>
