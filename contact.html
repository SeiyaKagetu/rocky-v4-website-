<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | NOVE OS V34</title>
    <style>
        :root { --bg: #05050a; --accent: #00ccff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 2rem; }
        header { border-bottom: 1px solid rgba(0,204,255,0.2); padding-bottom: 1rem; margin-bottom: 2rem; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); text-decoration: none; }
        .form-container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 15px; backdrop-filter: blur(10px); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>
<header><a href="index.html" class="logo">NOVE OS V34</a></header>
<main>
    <div class="form-container">
        <h1>お問い合わせ</h1>
        <p>導入のご相談、技術的な質問、または極秘案件に関するお問い合わせを承ります。</p>
        <form action="/api/contact" method="POST">
            <label>氏名</label>
            <input type="text" name="name" required placeholder="清也">
            <label>メールアドレス</label>
            <input type="email" name="email" required placeholder="admin@noveos.jp">
            <label>所属・組織</label>
            <input type="text" name="company" placeholder="NOVE INFINITY PROJECT">
            <label>お問い合わせ内容</label>
            <select name="plan">
                <option value="Personal">Personal Plan について</option>
                <option value="Defense">Defense Grade について</option>
                <option value="Ultimate">Ultimate Beyond (極秘案件) について</option>
                <option value="Other">その他</option>
            </select>
            <textarea name="message" rows="5" required placeholder="メッセージをご入力ください。"></textarea>
            <button type="submit" class="btn-submit">送信する (V34 Secure)</button>
        </form>
    </div>
</main>
</body>
</html>
