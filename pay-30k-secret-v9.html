<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>お支払い | NOVE OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 480px;
      width: 100%;
      padding: 40px;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #0071e3;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .description {
      font-size: 14px;
      color: #6e6e73;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .price-box {
      background: #fbfbfd;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
      border: 1px solid #d2d2d7;
    }
    .price-label {
      font-size: 12px;
      color: #86868b;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .price-amount {
      font-size: 32px;
      font-weight: 800;
      color: #1d1d1f;
    }
    .btn-pay {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #635bff, #4b44d4);
      color: #fff;
      text-decoration: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 17px;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 91, 255, 0.3);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-pay:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-pay:active { transform: translateY(0); }
    .btn-pay:disabled { background: #9ca3af; cursor: not-allowed; }
    .footer-note {
      font-size: 11px;
      color: #86868b;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">NOVE OS</div>
  <h1>お支払い手続き</h1>
  <p class="description">
    NOVE OS サービス提供一式の決済手続きです。<br>
    クレジットカード（Visa/Master/JCB/Amex）がご利用いただけます。
  </p>
  
  <div class="price-box">
    <div class="price-label">ご請求金額（税込）</div>
    <div class="price-amount">¥30,000</div>
  </div>

  <button class="btn-pay" id="btnPay" onclick="pay()">
    カードで支払う（¥30,000）
  </button>
  
  <p class="footer-note">
    決済はSSLで暗号化され、Stripeにより安全に処理されます。
  </p>
  <div id="error" style="color:#f85149;font-size:12px;margin-top:12px;display:none;"></div>
</div>

<script>
  const API_URL = 'https://nove-infinity-project-production.up.railway.app';

  async function pay() {
    const btn = document.getElementById('btnPay');
    const err = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = '処理中...';
    err.style.display = 'none';

    try {
      const res = await fetch(API_URL + '/api/stripe/invoice-checkout', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          amount: 30000,
          description: 'NOVE OS サービス提供一式（特別決済）',
          success_url: 'https://noveos.jp/success.html',
          cancel_url: window.location.href
        })
      });
      const data = await res.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        throw new Error(data.detail || '決済URLの取得に失敗しました');
      }
    } catch (e) {
      err.textContent = '⚠️ ' + e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'カードで支払う（¥30,000）';
    }
  }
</script>

</body>
</html>
