<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | NOVE OS V34</title>
    <style>
        :root { --bg: #05050a; --accent: #00ccff; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 5, 10, 0.8);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 10px rgba(0, 204, 255, 0.3));
        }

        .logo-text-group { display: flex; flex-direction: column; line-height: 1; }
        .logo-main {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(to right, #fff, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-suffix { font-weight: 300; opacity: 0.7; }
        .logo-version { font-size: 0.6rem; letter-spacing: 4px; color: #ff3366; font-weight: bold; margin-top: 4px; }

        .form-container { max-width: 600px; margin: 3rem auto; background: rgba(255,255,255,0.02); padding: 3rem 2rem; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid #222; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--accent); color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="logo-wrapper">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 30V10L30 30V10" stroke="url(#logo-grad-contact)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
                <linearGradient id="logo-grad-contact" x1="10" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#00ccff"/>
                    <stop offset="1" stop-color="#ff3366"/>
                </linearGradient>
            </defs>
        </svg>
        <div class="logo-text-group">
            <span class="logo-main">NOVE<span class="logo-suffix">OS</span></span>
            <span class="logo-version">V34 BEYOND</span>
        </div>
    </a>
</header>
<main>
    <div class="form-container">
        <h1>お問い合わせ</h1>
        <p>導入のご相談、技術的な質問、または極秘案件に関するお問い合わせを承ります。</p>
        <form action="/api/contact" method="POST">
            <label>氏名</label>
            <input type="text" name="name" required placeholder="清也">
            <label>メールアドレス</label>
            <input type="email" name="email" required placeholder="admin@noveos.jp">
            <label>所属・組織</label>
            <input type="text" name="company" placeholder="NOVE INFINITY PROJECT">
            <label>お問い合わせ内容</label>
            <select name="plan">
                <option value="Personal">Personal Plan について</option>
                <option value="Defense">Defense Grade について</option>
                <option value="Ultimate">Ultimate Beyond (極秘案件) について</option>
                <option value="Other">その他</option>
            </select>
            <textarea name="message" rows="5" required placeholder="メッセージをご入力ください。"></textarea>
            <button type="submit" class="btn-submit">送信する (V34 Secure)</button>
        </form>
    </div>
</main>
</body>
</html>
